test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# DigitalOcean Spaces (S3-compatible) per ADR-010 (as amended: ONE bucket
# partitioned by key prefix instead of four buckets). Credentials come from env
# (injected at deploy time from /etc/rooftrace/.env).
#
# NOTE: there is intentionally NO `prefix:` key here. Active Storage's S3 service
# has no such option and forwards unknown keys straight to Aws::S3::Client.new,
# which rejects `:prefix` with "invalid configuration option" and CRASHES boot.
# Key-prefix partitioning (uploads/ artifacts/ cache/) is enforced in the service
# objects (SpacesUploader, ArtifactStore, …) via their ALLOWED_KEY_PREFIX, not by
# Active Storage — and no model uses attachments, so this service is the wired
# default but the prefix concern lives entirely in app code.
spaces:
  service: S3
  access_key_id: <%= ENV["STORAGE_ACCESS_KEY"] %>
  secret_access_key: <%= ENV["STORAGE_SECRET_KEY"] %>
  endpoint: <%= ENV["STORAGE_ENDPOINT"] %>
  region: <%= ENV.fetch("STORAGE_REGION", "us-east-1") %>
  bucket: <%= ENV.fetch("STORAGE_BUCKET", "rooftrace") %>
  force_path_style: false

# Use bin/rails credentials:edit to set the AWS secrets (as aws:access_key_id|secret_access_key)
# amazon:
#   service: S3
#   access_key_id: <%= Rails.application.credentials.dig(:aws, :access_key_id) %>
#   secret_access_key: <%= Rails.application.credentials.dig(:aws, :secret_access_key) %>
#   region: us-east-1
#   bucket: your_own_bucket-<%= Rails.env %>

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
#   project: your_project
#   credentials: <%= Rails.root.join("path/to/gcs.keyfile") %>
#   bucket: your_own_bucket-<%= Rails.env %>

# mirror:
#   service: Mirror
#   primary: local
#   mirrors: [ amazon, google, microsoft ]
