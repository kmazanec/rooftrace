# Solid Queue supervisor config (workers + dispatchers). In production the
# supervisor runs INSIDE Puma (config/puma.rb, gated on SOLID_QUEUE_IN_PUMA=1,
# which compose.prod.yaml sets), so the single web container both serves HTTP and
# drains the geometry/fusion/projection jobs — no separate worker container.
default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
