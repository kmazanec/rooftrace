# Production docker-compose for RoofTrace on the shared `gauntlet` droplet.
# This is the ACTIVE deploy path (see the F-01 feature file & ADR-011 for why
# compose over Kamal). It mirrors how the sibling apps (cats, context-shield)
# deploy: containers join the existing `openemr_default` network so the
# droplet's Caddy container reverse-proxies to the web container by name
# (`rooftrace-web`).
#
# DEPLOYED VIA infra/deploy.sh (release-symlink pattern, matching the droplet
# convention in .infra/NEW_APP.md). The deploy script syncs this file to
# /etc/rooftrace/docker-compose.yml and runs compose from there. Build
# contexts are ABSOLUTE, anchored at the `current` release symlink, so the
# built images match the deployed SHA regardless of cwd:
#   /srv/rooftrace/current          — Rails image build context (repo root)
#   /srv/rooftrace/current/sidecar  — sidecar image build context
#
# Secrets come from /etc/rooftrace/.env (operator-placed, 640 root:gitlab-runner,
# audited by audit-secrets.sh) via `env_file:` — NOT interpolated from the
# runner's environment. See ops/README.md and infra/deploy.sh.

name: rooftrace

services:
  postgres:
    image: postgis/postgis:17-3.5
    container_name: rooftrace-postgres
    restart: unless-stopped
    # POSTGRES_USER/DB are static (non-secret); POSTGRES_PASSWORD comes from
    # the operator-placed env_file.
    environment:
      POSTGRES_USER: rooftrace
      POSTGRES_DB: rooftrace_production
    env_file:
      - /etc/rooftrace/.env
    volumes:
      # Data on the droplet's local disk per ADR-009; survives container
      # replacement so redeploys never lose data. (Kept at /opt/rooftrace/
      # postgres — the F-01 deploy already created it there with live data.)
      - /opt/rooftrace/postgres:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rooftrace"]
      interval: 5s
      timeout: 3s
      retries: 10

  sidecar:
    build:
      # Absolute context anchored at the release symlink (Dockerfile COPYs are
      # relative to sidecar/).
      context: /srv/rooftrace/current/sidecar
      dockerfile: Dockerfile
    container_name: rooftrace-sidecar
    restart: unless-stopped
    # Static, non-secret sidecar config. All secrets come from /etc/rooftrace/.env
    # via env_file (see ops/.env.example). Prod always uses REAL data: every stage's
    # real path is the DEFAULT (sidecar/app/flags.py), so there are NO *_LIVE opt-up
    # flags here and there must be NO *_FIXTURE opt-down flags (those are test-only).
    environment:
      # Fail-fast boot checks: raise on any missing real-path prerequisite.
      SIDECAR_ENV: production
      # The sidecar resolves blob refs from the same DO Spaces bucket as Rails;
      # its storage boot check (sidecar/app/boot_checks.py) requires all four
      # STORAGE_* vars. Bucket + endpoint are non-secret, so set them here
      # (mirroring the rails service) rather than relying on the env_file; the
      # secret ACCESS/SECRET keys stay in .env. Without these two the sidecar
      # raises at boot and never goes healthy, aborting the deploy.
      STORAGE_BUCKET: rooftrace
      STORAGE_ENDPOINT: https://nyc3.digitaloceanspaces.com
    env_file:
      # Provides the SECRET storage keys (STORAGE_ACCESS_KEY, STORAGE_SECRET_KEY),
      # SIDECAR_SHARED_SECRET, and the real-path requirements the boot checks
      # enforce: WESM_GPKG_PATH (real 3DEP index), MODAL_TOKEN_ID/SECRET (real
      # SAM2), MAPBOX_PUBLIC_TOKEN (real map render), OPENROUTER_API_KEY (real VLM).
      # Non-secret STORAGE_BUCKET/ENDPOINT are set in the environment: block above.
      # See ops/.env.example.
      - /etc/rooftrace/.env
    volumes:
      # The real USGS WESM GeoPackage (~3.5 GB) on the droplet's local disk,
      # mounted read-only at the path WESM_GPKG_PATH points to (/data/WESM.gpkg).
      # Real LiDAR is the default and the sidecar's boot check requires this file
      # to exist, so the operator must place it ONCE (see ops/README.md):
      #   sudo mkdir -p /opt/rooftrace/wesm
      #   sudo curl -fL -o /opt/rooftrace/wesm/WESM.gpkg \
      #     https://rockyweb.usgs.gov/vdelivery/Datasets/Staged/Elevation/metadata/WESM.gpkg
      - /opt/rooftrace/wesm/WESM.gpkg:/data/WESM.gpkg:ro
    networks:
      - internal
    healthcheck:
      # /opt/conda/bin/python by absolute path: healthchecks run with the base
      # image PATH (no micromamba activation), so bare `python` isn't found.
      test: ["CMD-SHELL", "/opt/conda/bin/python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=2)\""]
      interval: 5s
      timeout: 3s
      retries: 10

  rails:
    build:
      # Absolute context anchored at the release symlink (repo root = Rails app).
      context: /srv/rooftrace/current
      dockerfile: Dockerfile
    container_name: rooftrace-web
    restart: unless-stopped
    # Static, non-secret config here; all secrets + the composed DATABASE_URLs
    # come from /etc/rooftrace/.env via env_file (so no compose-time secret
    # interpolation and nothing sensitive in this committed file).
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "1"
      RAILS_SERVE_STATIC_FILES: "1"
      SIDECAR_URL: http://rooftrace-sidecar:8000
      STORAGE_ENDPOINT: https://nyc3.digitaloceanspaces.com
      STORAGE_REGION: nyc3
      STORAGE_BUCKET: rooftrace
      # Deployed git SHA surfaced in /health. infra/deploy.sh passes this via
      # --env-file git-sha.env (compose interpolation); defaults to "unknown"
      # for a manual `docker compose up` without that file.
      GIT_SHA: ${GIT_SHA:-unknown}
    env_file:
      # SECRET_KEY_BASE, DATABASE_URL, QUEUE/CACHE/CABLE_DATABASE_URL,
      # SIDECAR_SHARED_SECRET, STORAGE_ACCESS_KEY/SECRET_KEY, SKIP_SPACES_CHECK,
      # GIT_SHA — see ops/.env.example for the full list.
      - /etc/rooftrace/.env
    networks:
      - internal          # reach postgres + sidecar by name
      - openemr_default   # be reachable by the shared Caddy container
    depends_on:
      postgres:
        condition: service_healthy
      sidecar:
        condition: service_healthy
    # Liveness uses the CHEAP /up endpoint (a bare boot check — no S3, no
    # sidecar call), not /health (which does the heavier readiness probe).
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:80/up >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  internal:
    driver: bridge
  # The shared network the droplet's Caddy container lives on. Created by
  # the OpenEMR stack; we attach to it, not create it.
  openemr_default:
    external: true
