test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# DigitalOcean Spaces (S3-compatible) per ADR-010 (as amended in F-01: ONE
# bucket partitioned by key prefix instead of four buckets). ActiveStorage
# uploads land under the `uploads/` prefix of the single STORAGE_BUCKET.
# Credentials come from env (injected at deploy time from ops/.env.production).
spaces:
  service: S3
  access_key_id: <%= ENV["STORAGE_ACCESS_KEY"] %>
  secret_access_key: <%= ENV["STORAGE_SECRET_KEY"] %>
  endpoint: <%= ENV["STORAGE_ENDPOINT"] %>
  region: <%= ENV.fetch("STORAGE_REGION", "us-east-1") %>
  bucket: <%= ENV.fetch("STORAGE_BUCKET", "rooftrace") %>
  prefix: uploads
  force_path_style: false

# Use bin/rails credentials:edit to set the AWS secrets (as aws:access_key_id|secret_access_key)
# amazon:
#   service: S3
#   access_key_id: <%= Rails.application.credentials.dig(:aws, :access_key_id) %>
#   secret_access_key: <%= Rails.application.credentials.dig(:aws, :secret_access_key) %>
#   region: us-east-1
#   bucket: your_own_bucket-<%= Rails.env %>

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
#   project: your_project
#   credentials: <%= Rails.root.join("path/to/gcs.keyfile") %>
#   bucket: your_own_bucket-<%= Rails.env %>

