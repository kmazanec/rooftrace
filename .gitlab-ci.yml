# GitLab CI for RoofTrace. Two jobs:
#   - sidecar_test: pytest for the Python FastAPI sidecar.
#   - rails_test:   RSpec, including the real-IPC request spec. The sidecar
#                   runs as a uvicorn subprocess booted by
#                   spec/support/real_sidecar.rb (no mocks, per the F-01
#                   feature spec). Postgres+PostGIS comes from a service.
#
# NOTE: requires a GitLab runner to be enabled on the project. If the runner
# isn't yet configured, these jobs are defined and correct but won't execute
# until a runner is attached (tracked in the F-01 feature file as a deferred
# item for the user).

stages:
  - test

variables:
  POSTGRES_USER: rooftrace
  POSTGRES_PASSWORD: ci-password
  POSTGRES_DB: rooftrace_test
  DATABASE_HOST: postgres
  DATABASE_PORT: "5432"
  DATABASE_USERNAME: rooftrace
  DATABASE_PASSWORD: ci-password
  SIDECAR_SHARED_SECRET: ci-shared-secret
  RAILS_ENV: test

sidecar_test:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install --no-cache-dir uv
  script:
    - cd sidecar
    - uv sync
    - SIDECAR_SHARED_SECRET=ci-shared-secret uv run pytest -v

rails_test:
  stage: test
  image: ruby:4.0.1-slim
  services:
    - name: postgis/postgis:17-3.5
      alias: postgres
  variables:
    PGPASSWORD: ci-password
  before_script:
    # System deps for pg gem, libvips (ActiveStorage), psql client (sql
    # schema load), curl, and uv (to run the real sidecar subprocess).
    - apt-get update -qq
    - apt-get install --no-install-recommends -y build-essential git libpq-dev libvips libyaml-dev pkg-config postgresql-client curl ca-certificates
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - bundle install --jobs 4
    # Pre-sync the sidecar venv so the real_sidecar subprocess boots fast.
    - (cd sidecar && uv sync)
  script:
    - bin/rails db:test:prepare
    - bundle exec rspec
