default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>

development:
  <<: *default
  database: rooftrace_development

test:
  <<: *default
  database: rooftrace_test

# In production Rails reads DATABASE_URL (and the per-pool CACHE/QUEUE/CABLE
# variants) and merges them on top of the values below. Kamal injects
# DATABASE_URL pointing at the postgis accessory container.
production:
  primary: &primary_production
    <<: *default
    database: rooftrace_production
  cache:
    <<: *primary_production
    database: rooftrace_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: rooftrace_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: rooftrace_production_cable
    migrations_paths: db/cable_migrate
