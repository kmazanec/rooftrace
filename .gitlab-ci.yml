# GitLab CI for RoofTrace, on the shared `gauntlet` droplet.
#
# EXECUTOR NOTE (matches the droplet reality, see workspace INFRA.md §5 and
# yourai/context-shield/.gitlab-ci.yml): the `gauntlet-droplet` runner is a
# *shell* executor, so the GitLab `image:` keyword is IGNORED — jobs run
# directly on the host shell, which has Docker + git but no Ruby/Python
# toolchain. We therefore run the real test work inside containers via
# `docker run`. The host only needs Docker.
#
# OWNERSHIP RULE (the bug that broke pipeline #9366): the shell executor reuses
# a PERSISTENT checkout dir ($CI_PROJECT_DIR) across runs, and `get_sources`
# cleans it as the gitlab-runner host user. If a job writes into that dir from a
# container running as ROOT (uv's .venv, bundle gems, __pycache__, tmp/, log/),
# those root-owned files become un-deletable and the NEXT pipeline's checkout
# fails with "Permission denied". So: jobs MUST NOT write build artifacts back
# into $CI_PROJECT_DIR. We bind-mount the checkout READ-ONLY at /src, copy it to
# a throwaway /work INSIDE the (--rm) container, and do all writes there. Nothing
# persists to the host workspace; no caching yet (add later as named volumes if
# CI time warrants — NOT as in-checkout dirs).

stages:
  - verify
  - deploy

# Automated Cursor code + security review on merge requests, via the shared
# template (Cursor CLI). It runs on the dedicated `cursor-review` runner —
# the template's job sets its own tags/image/before_script, so it does NOT
# use the gauntlet-droplet shell-executor pattern below. Requires the repo
# CI/CD variables CURSOR_API_KEY and GITLAB_REVIEW_BOT_TOKEN (set per-project;
# there's no group to inherit from in this personal namespace).
include:
  - project: 'keithmazanec/gitlab-cursor-review'
    ref: main
    file: '/templates/cursor-review.yml'

default:
  tags:
    - gauntlet-droplet

# Pipelines on MRs (full verify) and on pushes to main (verify + deploy).
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

sidecar_test:
  stage: verify
  resource_group: heavy-droplet   # serialize w/ other heavy jobs (7.8G droplet)
  script:
    # Run on the SAME micromamba + conda-forge geo stack the production sidecar
    # image uses (see sidecar/Dockerfile), NOT plain python:3.12-slim. rasterio's
    # pip wheel needs system GDAL shared libs at IMPORT time; slim ships none, so
    # the imagery tests (rasterio.crs / project_bounds) and the boot-check that
    # asserts rasterio is importable could not pass there. conda-forge gdal +
    # rasterio + pdal mirror prod, so CI exercises the REAL geo path (imagery and
    # lidar tests run un-skipped, matching the runtime image) instead of a
    # divergent slim env that silently dropped coverage.
    #
    # Mount the REPO ROOT read-only (not just sidecar/): the contract tests read
    # shared/pipeline_schema.json and spec/fixtures/pipeline/, which live outside
    # sidecar/ (resolved via parents[2] of sidecar/tests). Copy to /work so the
    # read-only mount isn't written into, then run pytest from /work/sidecar.
    #
    # uv installs the pip app-deps INTO the conda env (UV_PROJECT_ENVIRONMENT).
    # --inexact keeps the conda-installed pdal/gdal/rasterio from being pruned;
    # rasterio is re-asserted from conda-forge AFTER sync so the importable build
    # (linked to the conda GDAL) is the one pytest sees — the prod recipe exactly.
    # --user root: the micromamba image defaults to a non-root user that can't
    # write /work; the prod build context is root and the other CI jobs run root.
    - >
      docker run --rm --user root
      -v "$CI_PROJECT_DIR":/src:ro
      -e UV_PROJECT_ENVIRONMENT=/opt/conda
      -e UV_LINK_MODE=copy
      mambaorg/micromamba:1.5-bookworm-slim
      bash -lc "set -e &&
        micromamba install -y -n base -c conda-forge python=3.12 pdal python-pdal gdal rasterio uv &&
        micromamba clean --all --yes &&
        cp -a /src /work && cd /work/sidecar &&
        uv sync --inexact &&
        micromamba install -y -n base -c conda-forge rasterio &&
        uv run pytest -v"

js_test:
  stage: verify
  resource_group: heavy-droplet   # serialize w/ other heavy jobs (7.8G droplet)
  script:
    # The React report-viewer island (ADR-013) is built with esbuild via
    # jsbundling-rails. Gate merges on: the JS unit/component suite (jest), a
    # successful production bundle (yarn build), and the bundle-size budget
    # (yarn bundle-size, which reads the freshly built app/assets/builds). Same
    # read-only-mount + copy-to-/work pattern as the other jobs so no build
    # artifacts (node_modules, .yarn state) leak back into the persistent
    # checkout. Corepack provides the Yarn Berry version pinned in package.json.
    - >
      docker run --rm
      -v "$CI_PROJECT_DIR":/src:ro
      node:22.17.1-slim
      bash -c "set -e &&
        corepack enable &&
        cp -a /src /work && cd /work &&
        yarn install --immutable &&
        yarn build &&
        yarn test &&
        yarn bundle-size"

rails_test:
  stage: verify
  resource_group: heavy-droplet
  script:
    # Sibling postgis container on a throwaway network. The RSpec suite boots
    # the real sidecar as a uvicorn subprocess (needs uv inside the ruby
    # container), so this one container needs both Ruby and uv.
    - NET="rooftrace-ci-$CI_JOB_ID"
    - PG="rooftrace-ci-pg-$CI_JOB_ID"
    - docker network create "$NET"
    - >
      docker run -d --name "$PG" --network "$NET" --network-alias postgres
      -e POSTGRES_USER=rooftrace -e POSTGRES_PASSWORD=ci-password -e POSTGRES_DB=rooftrace_test
      postgis/postgis:17-3.5
    # Wait for postgres to accept connections (don't race on a fixed sleep).
    - for i in $(seq 1 30); do docker exec "$PG" pg_isready -U rooftrace && break; sleep 1; done
    - |
      set -e
      docker run --rm --network "$NET" \
        -v "$CI_PROJECT_DIR":/src:ro \
        -e RAILS_ENV=test -e PGPASSWORD=ci-password \
        -e DATABASE_HOST=postgres -e DATABASE_PORT=5432 \
        -e DATABASE_USERNAME=rooftrace -e DATABASE_PASSWORD=ci-password \
        -e SIDECAR_SHARED_SECRET=ci-shared-secret \
        ruby:4.0.1-slim bash -c '
          set -e
          apt-get update -qq
          apt-get install --no-install-recommends -y build-essential git libpq-dev libvips libyaml-dev pkg-config postgresql-client curl ca-certificates
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          cp -a /src /work && cd /work
          bundle install --jobs 4
          (cd sidecar && uv sync)
          bin/rails db:test:prepare
          bundle exec rspec
        '
  after_script:
    - docker rm -f "rooftrace-ci-pg-$CI_JOB_ID" 2>/dev/null || true
    - docker network rm "rooftrace-ci-$CI_JOB_ID" 2>/dev/null || true

# Manual-trigger accuracy-validation harness (ADR-017 / ADR-006). NOT on every
# push: a full run creates Jobs + Measurements and incurs Modal/OpenRouter cost
# (~$5/run), so it is `when: manual` and never blocks the pipeline. The fast
# schema/metric/report/eval-scorer tests already run in `sidecar_test` (they
# carry no `slow` marker), so this job exists only for an on-demand FULL run
# with live credentials, gated behind explicit approval.
#
# It needs a Postgres DB (the Rails runner persists Measurements) and the live
# creds (STORAGE_*, OPENROUTER_API_KEY, IMAGERY_LIVE, LIDAR_LIVE/Modal) supplied
# as protected CI/CD variables. ADDRESS_LIMIT keeps the default to a 3-address
# smoke; remove it for the full 15+3 set.
validation_harness:
  stage: verify
  resource_group: heavy-droplet
  needs: []
  when: manual
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  variables:
    ADDRESS_LIMIT: "3"
  script:
    - NET="rooftrace-val-$CI_JOB_ID"
    - PG="rooftrace-val-pg-$CI_JOB_ID"
    - docker network create "$NET"
    - >
      docker run -d --name "$PG" --network "$NET" --network-alias postgres
      -e POSTGRES_USER=rooftrace -e POSTGRES_PASSWORD=ci-password -e POSTGRES_DB=rooftrace_test
      postgis/postgis:17-3.5
    - for i in $(seq 1 30); do docker exec "$PG" pg_isready -U rooftrace && break; sleep 1; done
    - |
      set -e
      docker run --rm --network "$NET" \
        -v "$CI_PROJECT_DIR":/src:ro \
        -e RAILS_ENV=test -e PGPASSWORD=ci-password \
        -e DATABASE_HOST=postgres -e DATABASE_PORT=5432 \
        -e DATABASE_USERNAME=rooftrace -e DATABASE_PASSWORD=ci-password \
        -e SIDECAR_SHARED_SECRET=ci-shared-secret \
        -e ADDRESS_LIMIT="$ADDRESS_LIMIT" \
        -e IMAGERY_LIVE="$IMAGERY_LIVE" -e LIDAR_LIVE="$LIDAR_LIVE" \
        -e OPENROUTER_API_KEY="$OPENROUTER_API_KEY" \
        -e STORAGE_ACCESS_KEY="$STORAGE_ACCESS_KEY" -e STORAGE_SECRET_KEY="$STORAGE_SECRET_KEY" \
        -e STORAGE_ENDPOINT="$STORAGE_ENDPOINT" -e STORAGE_BUCKET="$STORAGE_BUCKET" \
        ruby:4.0.1-slim bash -c '
          set -e
          apt-get update -qq
          apt-get install --no-install-recommends -y build-essential git libpq-dev libvips libyaml-dev pkg-config postgresql-client curl ca-certificates
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          cp -a /src /work && cd /work
          bundle install --jobs 4
          (cd sidecar && uv sync)
          bin/rails db:test:prepare
          bin/rails validation:run_measurements
          (cd sidecar && uv run python -m validation.report)
        '
  after_script:
    - docker rm -f "rooftrace-val-pg-$CI_JOB_ID" 2>/dev/null || true
    - docker network rm "rooftrace-val-$CI_JOB_ID" 2>/dev/null || true

# Cursor code + security review (see the `include:` at the top). Inherits the
# template's cursor-review runner tag, cursor-ci image, MR-only rules, and
# before_script — none of the gauntlet-droplet default applies. Runs in the
# `verify` stage so it's parallel with the tests on an MR; independent of them
# (needs: []) so a failing test doesn't cancel the review and vice versa.
cursor_code_review:
  extends: .cursor_review
  stage: verify
  needs: []

deploy:
  stage: deploy
  resource_group: heavy-droplet
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs: [sidecar_test, rails_test, js_test]
  variables:
    # Pin the deploy to the SHA we just verified, defending the needs: gate
    # against a race with a later push.
    DEPLOY_SHA: $CI_COMMIT_SHA
  script:
    - bash ./infra/deploy.sh
