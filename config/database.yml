default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  # Local dev/test default to the throwaway PostGIS container documented in the
  # README (postgis/postgis on :5433, user/pass rooftrace/devpassword). Every
  # field is still env-overridable, so CI and other hosts set DATABASE_* without
  # editing this file — but a fresh local checkout runs `bin/rails`/`rspec` with
  # ZERO exported vars.
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "rooftrace") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "devpassword") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5433) %>

development:
  <<: *default
  database: rooftrace_development

test:
  <<: *default
  database: rooftrace_test

# In production Rails reads DATABASE_URL (and the per-pool CACHE/QUEUE/CABLE
# variants) and merges them on top of the values below. Kamal injects
# DATABASE_URL pointing at the postgis accessory container.
production:
  primary: &primary_production
    <<: *default
    database: rooftrace_production
  cache:
    <<: *primary_production
    database: rooftrace_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: rooftrace_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: rooftrace_production_cable
    migrations_paths: db/cable_migrate
