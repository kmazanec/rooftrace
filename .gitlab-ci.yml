# GitLab CI for RoofTrace, on the shared `gauntlet` droplet.
#
# EXECUTOR NOTE (matches the droplet reality, see workspace INFRA.md §5 and
# yourai/context-shield/.gitlab-ci.yml): the `gauntlet-droplet` runner is a
# *shell* executor, so the GitLab `image:` keyword is IGNORED — jobs run
# directly on the host shell, which has Docker + git but no Ruby/Python
# toolchain. We therefore run the real test work inside containers via
# `docker run`. The host only needs Docker.
#
# BUILD-ONCE / TEST-THE-IMAGE / DEPLOY-THE-IMAGE (ADR-011 amended): instead of
# reinstalling the gem/JS/conda/uv toolchains from scratch in every verify job
# (the old model — ~10GB of downloads per run, several deps fetched 2–3× across
# jobs, nothing cacheable because of the ownership rule below), the `build` stage
# builds the PRODUCTION images ONCE, SHA-tagged, and the `verify` jobs run the
# test suites INSIDE those exact images, and `deploy` reuses the same SHA-tagged
# prod image. No registry: the runner and the prod droplet are the SAME host, so
# a local SHA tag IS the shared artifact (Docker's layer cache does the cross-
# pipeline reuse the old per-job installs couldn't). This also makes CI test the
# literal production artifact — no slim-vs-conda drift.
#
# OWNERSHIP RULE (the bug that broke pipeline #9366): the shell executor reuses
# a PERSISTENT checkout dir ($CI_PROJECT_DIR) across runs, and `get_sources`
# cleans it as the gitlab-runner host user. If a job writes into that dir from a
# container running as ROOT, those root-owned files become un-deletable and the
# NEXT pipeline's checkout fails with "Permission denied". `docker build` is safe
# here: it READS $CI_PROJECT_DIR as build context but writes layers to the docker
# daemon's storage, never back into the checkout. The verify jobs likewise mount
# the checkout READ-ONLY and write only inside the (--rm) container / named
# volumes on the host's docker storage — never into $CI_PROJECT_DIR.

stages:
  - build
  - verify
  - deploy

# Automated Cursor code + security review on merge requests, via the shared
# template (Cursor CLI). It runs on the dedicated `cursor-review` runner —
# the template's job sets its own tags/image/before_script, so it does NOT
# use the gauntlet-droplet shell-executor pattern below. Requires the repo
# CI/CD variables CURSOR_API_KEY and GITLAB_REVIEW_BOT_TOKEN (set per-project;
# there's no group to inherit from in this personal namespace).
include:
  - project: 'keithmazanec/gitlab-cursor-review'
    ref: main
    file: '/templates/cursor-review.yml'

default:
  tags:
    - gauntlet-droplet

# Pipelines on MRs (full verify) and on pushes to main (verify + deploy).
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ---------------------------------------------------------------------------
# build: build the prod images + the sidecar test target ONCE, SHA-tagged (and
# :latest so a manual `docker compose up` / deploy without a SHA still resolves).
# The rails PROD image already carries the full Ruby test toolchain (the Gemfile
# :test group installs under BUNDLE_WITHOUT=development — only :development-only
# web-console is dropped), so it doubles as the rails test image; no separate
# rails test target. The sidecar prod image is --no-dev, so its test suite needs
# the `test` target (adds pytest/jsonschema/... + tests/ + validation/).
# ---------------------------------------------------------------------------
build_images:
  stage: build
  resource_group: heavy-droplet   # serialize w/ other heavy jobs (7.8G droplet)
  script:
    - export DOCKER_BUILDKIT=1
    # Rails prod image (context = repo root). Also tag :latest.
    - docker build -t "rooftrace-rails:$CI_COMMIT_SHA" -t rooftrace-rails:latest .
    # Sidecar prod image (default target) + sidecar test image (--target test),
    # context = sidecar/. The test image shares all the heavy base layers with
    # prod, so the second build is cheap.
    - docker build -t "rooftrace-sidecar:$CI_COMMIT_SHA" -t rooftrace-sidecar:latest ./sidecar
    - docker build --target test -t "rooftrace-sidecar-test:$CI_COMMIT_SHA" ./sidecar

# ---------------------------------------------------------------------------
# sidecar_test: run pytest INSIDE the sidecar test image (deps already baked —
# no install). The contract tests resolve repo-root files via parents[2] of
# sidecar/tests → "/shared" and "/spec"; mount those from the read-only checkout.
# The fixture opt-down (IMAGERY_FIXTURE/... + SAM2_BACKEND=local) is set by
# tests/conftest.py, so the suite stays hermetic without live creds.
# ---------------------------------------------------------------------------
sidecar_test:
  stage: verify
  resource_group: heavy-droplet
  needs: [build_images]
  script:
    - >
      docker run --rm
      -v "$CI_PROJECT_DIR/shared":/shared:ro
      -v "$CI_PROJECT_DIR/spec":/spec:ro
      -e SIDECAR_SHARED_SECRET=test-shared-secret
      -w /app
      "rooftrace-sidecar-test:$CI_COMMIT_SHA"
      /opt/conda/bin/python -m pytest -v

# ---------------------------------------------------------------------------
# js_test: the React report-viewer island (ADR-013) — jest unit/component suite
# + bundle-size budget. Run INSIDE the rails image, which already built the
# viewer bundle (jsbundling assets:precompile) and has the JS deps installed,
# so there's no extra install. The viewer bundle (`yarn build`) already ran in
# the image during assets:precompile.
#
# Driven via `npm run`, NOT `yarn`: the PROD runtime image deliberately ships
# only the `node` + `npm` launchers (node is needed at request time so Grover can
# shell out to Puppeteer — ADR-014), NOT the Yarn/Corepack launcher, which the
# running app never uses. The package.json scripts are package-manager-agnostic
# (each just invokes `node ...`), so `npm run test` / `npm run bundle-size`
# execute the identical jest + bundle-size commands using the deps already baked
# into the image — keeping the runtime image lean instead of carrying a Yarn
# launcher purely to satisfy a CI job.
# ---------------------------------------------------------------------------
js_test:
  stage: verify
  resource_group: heavy-droplet
  needs: [build_images]
  script:
    - >
      docker run --rm -w /rails
      "rooftrace-rails:$CI_COMMIT_SHA"
      bash -c "npm run test && npm run bundle-size"

# ---------------------------------------------------------------------------
# rails_test: run RSpec INSIDE the rails prod image. The suite exercises the real
# Rails↔sidecar IPC boundary, so we stand up TWO siblings on a throwaway network:
# postgres, and the sidecar TEST image (the same one sidecar_test uses — it has a
# runnable uvicorn + the app + fixtures). spec/support/real_sidecar.rb connects to
# SIDECAR_URL instead of spawning uv (the local-dev path) when the URL is preset.
#
# SHARED STORAGE (the subtle part): the e2e pipeline spec writes a planted point-
# array .npy to STORAGE_LOCAL_ROOT and the sidecar reads it back during fit-planes
# — they need the SAME local-fs blob store. In the subprocess model that's one
# host fs for free; here it's a named volume mounted into BOTH containers. Both
# the rails image (user 1000) and the sidecar sibling (run --user 1000:1000 here)
# write as uid 1000, and we pre-own the volume root as 1000 so neither creates a
# dir the other can't write. VALIDATION_ROOT is redirected to a writable seeded
# copy of the 44K validation corpus (the sidecar tree isn't in the rails image,
# and /rails is root-owned).
rails_test:
  stage: verify
  resource_group: heavy-droplet
  needs: [build_images]
  script:
    - NET="rooftrace-ci-$CI_JOB_ID"
    - PG="rooftrace-ci-pg-$CI_JOB_ID"
    - SC="rooftrace-ci-sidecar-$CI_JOB_ID"
    - VOL="rooftrace-ci-store-$CI_JOB_ID"
    - docker network create "$NET"
    # Shared blob-store volume, root pre-owned by uid 1000 (both containers' user)
    # so cross-container reads/writes don't hit a uid-mismatch permission wall.
    - docker volume create "$VOL"
    - docker run --rm -v "$VOL":/s alpine sh -c 'mkdir -p /s && chown 1000:1000 /s && chmod 0775 /s'
    # Postgres sibling.
    - >
      docker run -d --name "$PG" --network "$NET" --network-alias postgres
      -e POSTGRES_USER=rooftrace -e POSTGRES_PASSWORD=ci-password -e POSTGRES_DB=rooftrace_test
      postgis/postgis:17-3.5
    # Sidecar sibling (test image), run as uid 1000 with the fixture opt-down so it
    # boots hermetically and shares the blob volume with rails. HOME=/tmp because
    # uid 1000 isn't the image's named user and has no home.
    - >
      docker run -d --name "$SC" --network "$NET" --network-alias sidecar --user 1000:1000
      -e SIDECAR_SHARED_SECRET=ci-shared-secret
      -e IMAGERY_FIXTURE=1 -e LIDAR_FIXTURE=1 -e RENDER_IMAGES_FIXTURE=1 -e PROJECT_PHOTO_FIXTURE=1
      -e SAM2_BACKEND=local
      -e STORAGE_LOCAL_ROOT=/shared-storage
      -e WESM_FIXTURE_PATH=/app/tests/fixtures/f06/wesm_index.json
      -e HOME=/tmp
      -v "$VOL":/shared-storage
      "rooftrace-sidecar-test:$CI_COMMIT_SHA"
    # Wait for postgres + the sidecar's /health (sidecar boots a conda stack, so
    # give it room).
    - for i in $(seq 1 30); do docker exec "$PG" pg_isready -U rooftrace && break; sleep 1; done
    - >
      for i in $(seq 1 60); do
        docker exec "$SC" /opt/conda/bin/python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=2).status==200 else 1)" && break;
        sleep 1;
      done
    - |
      set -e
      docker run --rm --network "$NET" \
        -v "$VOL":/shared-storage \
        -v "$CI_PROJECT_DIR/sidecar/validation":/seed/validation:ro \
        -e RAILS_ENV=test -e PGPASSWORD=ci-password \
        -e DATABASE_HOST=postgres -e DATABASE_PORT=5432 \
        -e DATABASE_USERNAME=rooftrace -e DATABASE_PASSWORD=ci-password \
        -e SIDECAR_URL=http://sidecar:8000 \
        -e SIDECAR_SHARED_SECRET=ci-shared-secret \
        -e STORAGE_LOCAL_ROOT=/shared-storage \
        -e VALIDATION_ROOT=/tmp/validation \
        -e PUPPETEER_CACHE_DIR=/usr/local/puppeteer \
        "rooftrace-rails:$CI_COMMIT_SHA" bash -c '
          set -e
          # The validation:* rake-task specs read the 44KB validation corpus
          # (labels.json/manifest.json/test_addresses.yaml) AND write outputs
          # (results/, predictions_*.json) under VALIDATION_ROOT. The rails image
          # does not ship sidecar/, and /rails is root-owned (we run as uid 1000),
          # so seed a WRITABLE copy from the read-only checkout (mounted at /seed)
          # into /tmp and point VALIDATION_ROOT at it.
          cp -a /seed/validation /tmp/validation
          bin/rails db:test:prepare
          bundle exec rspec
        '
  after_script:
    - docker rm -f "rooftrace-ci-pg-$CI_JOB_ID" "rooftrace-ci-sidecar-$CI_JOB_ID" 2>/dev/null || true
    - docker network rm "rooftrace-ci-$CI_JOB_ID" 2>/dev/null || true
    - docker volume rm -f "rooftrace-ci-store-$CI_JOB_ID" 2>/dev/null || true

# Manual-trigger accuracy-validation harness (ADR-017 / ADR-006). NOT on every
# push: a full run creates Jobs + Measurements and incurs Modal/OpenRouter cost
# (~$5/run), so it is `when: manual` and never blocks the pipeline. It runs on the
# FULL checkout (it has the sidecar tree + validation corpus), independent of the
# in-image rails_test (which only smoke-runs the validation tasks). It is the
# authoritative run of the validation rake tasks.
#
# Kept on the OLD install-toolchain model on purpose: it injects LIVE secrets
# (STORAGE_*/OPENROUTER_API_KEY) into a container running the pipeline's checked-
# out code. Sharing the build images / a cache volume with the MR-triggered jobs
# would open a cache-poisoning path into this credentialed job; isolation > speed
# for a rarely-run manual job.
validation_harness:
  stage: verify
  resource_group: heavy-droplet
  needs: []
  when: manual
  allow_failure: true
  # main (a protected ref) ONLY — never on merge_request_event. This job injects
  # live STORAGE_*/OPENROUTER_API_KEY secrets into a container running the
  # pipeline's CHECKED-OUT code; on an MR that code is untrusted (a branch/fork
  # could rewrite the rake task or a sidecar module to exfiltrate the vars the
  # moment a maintainer clicks the manual job). Restricting to protected main
  # keeps the credentialed run on trusted code only. Keep these CI/CD variables
  # marked "protected" so unprotected-ref pipelines can never see them.
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  variables:
    ADDRESS_LIMIT: "3"
  script:
    - NET="rooftrace-val-$CI_JOB_ID"
    - PG="rooftrace-val-pg-$CI_JOB_ID"
    - docker network create "$NET"
    - >
      docker run -d --name "$PG" --network "$NET" --network-alias postgres
      -e POSTGRES_USER=rooftrace -e POSTGRES_PASSWORD=ci-password -e POSTGRES_DB=rooftrace_test
      postgis/postgis:17-3.5
    - for i in $(seq 1 30); do docker exec "$PG" pg_isready -U rooftrace && break; sleep 1; done
    - |
      set -e
      docker run --rm --network "$NET" \
        -v "$CI_PROJECT_DIR":/src:ro \
        -e RAILS_ENV=test -e PGPASSWORD=ci-password \
        -e DATABASE_HOST=postgres -e DATABASE_PORT=5432 \
        -e DATABASE_USERNAME=rooftrace -e DATABASE_PASSWORD=ci-password \
        -e SIDECAR_SHARED_SECRET=ci-shared-secret \
        -e ADDRESS_LIMIT="$ADDRESS_LIMIT" \
        -e IMAGERY_LIVE="$IMAGERY_LIVE" -e LIDAR_LIVE="$LIDAR_LIVE" \
        -e OPENROUTER_API_KEY="$OPENROUTER_API_KEY" \
        -e STORAGE_ACCESS_KEY="$STORAGE_ACCESS_KEY" -e STORAGE_SECRET_KEY="$STORAGE_SECRET_KEY" \
        -e STORAGE_ENDPOINT="$STORAGE_ENDPOINT" -e STORAGE_BUCKET="$STORAGE_BUCKET" \
        ruby:4.0.1-slim bash -c '
          set -e
          apt-get update -qq
          apt-get install --no-install-recommends -y build-essential git libpq-dev libvips libyaml-dev pkg-config postgresql-client curl ca-certificates
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          cp -a /src /work && cd /work
          bundle install --jobs 4
          (cd sidecar && uv sync)
          bin/rails db:test:prepare
          bin/rails validation:run_measurements
          (cd sidecar && uv run python -m validation.report)
        '
  after_script:
    - docker rm -f "rooftrace-val-pg-$CI_JOB_ID" 2>/dev/null || true
    - docker network rm "rooftrace-val-$CI_JOB_ID" 2>/dev/null || true

# Cursor code + security review (see the `include:` at the top). Inherits the
# template's cursor-review runner tag, cursor-ci image, MR-only rules, and
# before_script — none of the gauntlet-droplet default applies. Runs in the
# `verify` stage so it's parallel with the tests on an MR; independent of them
# (needs: []) so a failing test doesn't cancel the review and vice versa.
cursor_code_review:
  extends: .cursor_review
  stage: verify
  needs: []

deploy:
  stage: deploy
  resource_group: heavy-droplet
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs: [sidecar_test, rails_test, js_test]
  variables:
    # Pin the deploy to the SHA we just verified, defending the needs: gate
    # against a race with a later push. deploy.sh reuses the SHA-tagged images
    # build_images produced (no rebuild).
    DEPLOY_SHA: $CI_COMMIT_SHA
  script:
    - bash ./infra/deploy.sh
