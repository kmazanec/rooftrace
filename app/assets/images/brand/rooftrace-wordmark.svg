<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" width="240" height="48" role="img" aria-label="RoofTrace">
  <title>RoofTrace</title>
  <!-- Roof/peak glyph: a clean geometric peak mark -->
  <polyline
    points="6,38 18,14 30,38"
    fill="none"
    stroke="#1C1C1E"
    stroke-width="3.5"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
  <!-- Horizontal baseline under peak -->
  <line x1="4" y1="38" x2="32" y2="38" stroke="#1C1C1E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wordmark text -->
  <text
    x="42"
    y="34"
    font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif"
    font-size="22"
    font-weight="600"
    letter-spacing="-0.3"
    fill="#1C1C1E"
  >RoofTrace</text>
</svg>
